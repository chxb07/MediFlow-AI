[build]
  command = "npm run build"
  publish = "dist"

# Single Page Application (SPA) Redirects
[[redirects]]
  from = "/api/keep-alive"
  to = "/.netlify/functions/keep-alive"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled Function (Hourly cron)
[functions."keep-alive"]
  schedule = "@hourly"
